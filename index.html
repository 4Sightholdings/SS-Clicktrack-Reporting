<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.jsscript>

<style>
body {
    font-family: Segoe UI;
    margin:0;
    padding:20px;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
}

/* HEADER */
.header { text-align:center; margin-bottom:25px; }
.header h1 { font-size:36px; }
.subtitle { color:#9bb7ff; }

/* FILTERS */
.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
input,select,button {
    padding:10px;
    border-radius:8px;
    border:none;
}
button { background:#0078d4; color:white; cursor:pointer; }

/* DASHBOARD */
.dashboard {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:25px;
}
.card {
    background: rgba(255,255,255,0.15);
    padding:15px;
    border-radius:10px;
    width:150px;
    text-align:center;
}
.value { font-size:22px; }

/* TABS */
.tabs { display:flex; justify-content:center; margin-bottom:15px; }
.tab {
    padding:8px 18px;
    margin:4px;
    border-radius:8px;
    background: rgba(255,255,255,0.2);
    cursor:pointer;
}
.tab.active { background:white; color:#002f6c; }

/* CLUSTER */
.cluster { display:none; }
.cluster.active { display:block; }

/* COLORS */
.cp { background:#ff4d4d; }
.be { background:#4da6ff; }
.it { background:#ffd633; color:black; }
.ot { background:#33cc99; }

.cluster-title {
    padding:10px;
    border-radius:8px 8px 0 0;
}

/* TABLE DESIGN FIX */
.table-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(6px);
    border-radius:0 0 8px 8px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th {
    background:#002f6c;
    color:white;
    padding:10px;
}

td {
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover td {
    background:rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<div class="header">
<h1>4Sight Click Intelligence</h1>
<div class="subtitle">Interactive Campaign Engagement Dashboard</div>
</div>

<div class="filters">
<input type="file" id="fileInput">
<button id="deployBtn">Deploy</button>

<select id="monthFilter">
<option value="all">All Months</option>
</select>

<select id="weekFilter">
<option value="all">All Weeks</option>
</select>
</div>

<div class="dashboard">
<div class="card"><div id="total" class="value">--</div>Total</div>
<div class="card"><div id="external" class="value">--</div>Clicks</div>
<div class="card"><div id="recipients" class="value">--</div>Recipients</div>
<div class="card"><div id="senders" class="value">--</div>Senders</div>
</div>

<div class="tabs">
<div class="tab active" onclick="showCluster('CP')" id="tab-CP">CP</div>
<div class="tab" onclick="showCluster('BE')" id="tab-BE">BE</div>
<div class="tab" onclick="showCluster('IT')" id="tab-IT">IT</div>
<div class="tab" onclick="showCluster('OT')" id="tab-OT">OT</div>
</div>

<div id="CP" class="cluster active"><div class="cluster-title cp">Channel Partner</div><div class="table-box" id="cpTable"></div></div>
<div id="BE" class="cluster"><div class="cluster-title be">Business Environment</div><div class="table-box" id="beTable"></div></div>
<div id="IT" class="cluster"><div class="cluster-title it">Information Technology</div><div class="table-box" id="itTable"></div></div>
<div id="OT" class="cluster"><div class="cluster-title ot">Operational Technology</div><div class="table-box" id="otTable"></div></div>

<script>

let rawData=null;

// SWITCH TAB
function showCluster(c){
    document.querySelectorAll(".cluster").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.getElementById(c).classList.add("active");
    document.getElementById("tab-"+c).classList.add("active");
}

// LOAD FILE
fileInput.addEventListener("change", e=>{
    let reader=new FileReader();
    reader.onload=(evt)=>{
        let wb=XLSX.read(evt.target.result,{type:'array'});
        rawData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        alert("✅ File loaded: "+rawData.length+" rows");
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

// DEPLOY
deployBtn.addEventListener("click",()=>{
    if(!rawData){ alert("Upload file first"); return; }

    setupFilters();
    render();
});

// FILTER SETUP
function setupFilters(){

    monthFilter.innerHTML="<option value='all'>All Months</option>";
    weekFilter.innerHTML="<option value='all'>All Weeks</option>";

    let months=new Set(), weeks=new Set();

    rawData.forEach(d=>{
        let date=new Date(d["Time Clicked"]);
        if(!isNaN(date)){
            months.add(date.getMonth());
            weeks.add(getWeek(date));
        }
    });

    months.forEach(m=>{
        let o=document.createElement("option");
        o.value=m;
        o.text="Month "+(m+1);
        monthFilter.add(o);
    });

    [...weeks].sort().forEach(w=>{
        let o=document.createElement("option");
        o.value=w;
        o.text="Week "+w;
        weekFilter.add(o);
    });
}

function getWeek(d){
    let start=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-start)/86400000+start.getDay()+1)/7);
}

// MAIN LOGIC
function render(){

    let clean=rawData.filter(d=>!["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker));

    let m=monthFilter.value;
    let w=weekFilter.value;

    clean=clean.filter(d=>{
        let date=new Date(d["Time Clicked"]);
        if(m!="all" && date.getMonth()!=m) return false;
        if(w!="all" && getWeek(date)!=w) return false;
        return true;
    });

    // ✅ DEDUP FIX
    let map={};
    clean.forEach(d=>{
        let date= (d["Time Clicked"]||"").split(" ")[0];
        let key=(d.Receiver||"")+ (d.Template||"")+ date;
        if(!map[key]) map[key]=d;
    });

    let final=Object.values(map);

    total.innerText=rawData.length;
    external.innerText=final.length;
    recipients.innerText=new Set(final.map(x=>x.Receiver)).size;
    senders.innerText=new Set(final.map(x=>x.Sender)).size;

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=(d.Template||"").toLowerCase();
        if(t.includes("copilot")||t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("be")) clusters.BE.push(d);
        else if(t.includes("it")) clusters.IT.push(d);
        else if(t.includes("ot")) clusters.OT.push(d);
    });

    build("cpTable",clusters.CP);
    build("beTable",clusters.BE);
    build("itTable",clusters.IT);
    build("otTable",clusters.OT);
}

function build(id,data){
    let html="<table><tr><th>Banner</th><th>Email</th><th>Sender</th><th>Clicked</th></tr>";

    data.forEach(r=>{
        html+=`<tr>
        <td>${r.Template}</td>
        <td>${r.Receiver}</td>
        <td>${r.Sender}</td>
        <td>${r["Time Clicked"]}</td>
        </tr>`;
    });

    html+="</table>";
    document.getElementById(id).innerHTML=html;
}

monthFilter.onchange=render;
weekFilter.onchange=render;

</script>

</body>
</html>
