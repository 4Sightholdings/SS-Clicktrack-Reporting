<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<!-- ✅ FIXED SCRIPT LOADER -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    margin:0;
    padding:20px;
    background: radial-gradient(circle at top, #0a2a5e, #001833 80%);
    color:white;
}

/* HEADER */
.header { text-align:center; margin-bottom:30px; }
.header h1 { font-size:38px; }
.subtitle { color:#9bb7ff; }

/* FILTERS */
.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:25px;
}
input, select, button {
    padding:10px;
    border-radius:8px;
    border:none;
    font-size:14px;
}
button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* DASHBOARD */
.dashboard { display:flex; justify-content:center; gap:20px; margin-bottom:25px; }
.card {
    background: rgba(255,255,255,0.15);
    padding:18px;
    border-radius:10px;
    width:170px;
    text-align:center;
}
.value { font-size:24px; font-weight:bold; }

/* TABS */
.tabs { display:flex; justify-content:center; margin-bottom:20px; }
.tab {
    padding:10px 20px;
    margin:4px;
    border-radius:8px;
    background: rgba(255,255,255,0.2);
    cursor:pointer;
}
.tab.active {
    background:white;
    color:#002f6c;
}

/* CLUSTERS */
.cluster { display:none; }
.cluster.active { display:block; }

.cp { background:#ff4d4d; }
.be { background:#4da6ff; }
.it { background:#ffd633; color:black; }
.ot { background:#33cc99; }

.cluster-title {
    padding:12px;
    border-radius:6px 6px 0 0;
}

/* TABLE */
.table-box {
    background:white;
    border-radius:0 0 6px 6px;
    overflow:hidden;
    max-height:350px;
}
table { width:100%; border-collapse:collapse; }
th { background:#002f6c; color:white; padding:10px; }
td { padding:8px; color:#333; border-bottom:1px solid #ddd; }
</style>
</head>

<body>

<div class="header">
    <h1>4Sight Click Intelligence</h1>
    <div class="subtitle">Interactive Campaign Engagement Dashboard</div>
</div>

<div class="filters">
    <input type="file" id="fileInput" accept=".xlsx">
    <button id="deployBtn">Deploy Report</button>

    <select id="monthFilter">
        <option value="all">All Months</option>
    </select>
